<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>


    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>calculadora</h2>

    <input type="number" id="num1" placeholder="numero 1">
    <input type="number" id="num2" placeholder="numero 2">

    <div class="botoes">
        <button class="soma" onclick="soma()">+</button>
        <button class="sub" onclick="sub()">−</button>
        <button class="mult" onclick="mult()":>×</button>
    </div>

    <div class="resultado">
        Resultado: <span id="resultado">0</span>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
